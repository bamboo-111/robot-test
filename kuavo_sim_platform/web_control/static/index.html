<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kuavo 5-W 控制台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101216;
      --panel: #181c22;
      --panel-2: #20262e;
      --panel-3: #11161d;
      --text: #eef2f7;
      --muted: #9ca8b8;
      --line: #313946;
      --accent: #4fb3ff;
      --danger: #ff5b6b;
      --ok: #3fd183;
      --warn: #f2c94c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1240px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: minmax(360px, 440px) 1fr;
      gap: 16px;
    }
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 24px; font-weight: 650; letter-spacing: 0; }
    .sub { margin-top: 4px; color: var(--muted); max-width: 820px; }
    a.nav-link, button, select, input[type="file"] {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      text-decoration: none;
    }
    a.nav-link:hover, button:hover { border-color: var(--accent); }
    button { cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button.primary { background: #173348; border-color: #25668f; }
    button.danger { background: #481b24; border-color: #8f2c3d; }
    button.warn { background: #3f3416; border-color: #7a6424; }
    button:disabled { opacity: .55; cursor: wait; }
    select, input[type="file"] { width: 100%; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    h2 { margin: 0 0 10px; font-size: 15px; font-weight: 650; }
    .panel-stack { display: grid; gap: 12px; }
    .flow { display: grid; gap: 10px; }
    .group { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 2px; }
    .group:first-child { border-top: 0; padding-top: 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .wide { grid-column: 1 / -1; }
    .status { display: flex; align-items: center; gap: 8px; color: var(--muted); margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--ok); }
    .dot.fail { background: var(--danger); }
    .dot.busy { background: var(--warn); }
    .hint { color: var(--muted); font-size: 12px; margin: -4px 0 8px; }
    .meta {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-3);
      color: var(--muted);
      padding: 8px 10px;
      font: 12px/1.45 "Cascadia Mono", Consolas, monospace;
      overflow-wrap: anywhere;
    }
    pre {
      margin: 0;
      min-height: 640px;
      max-height: calc(100vh - 160px);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #090b0e;
      color: #d8dee9;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      font: 12px/1.45 "Cascadia Mono", Consolas, monospace;
    }
    .ep-list { max-height: 320px; overflow: auto; }
    .ep-item {
      cursor: pointer;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      line-height: 1.4;
    }
    .ep-item:hover { background: var(--panel-2); }
    .ep-item.active { background: #1a2a3b; border-left: 3px solid var(--accent); }
    .ep-ok { color: var(--ok); font-weight: 650; }
    .ep-fail { color: var(--danger); font-weight: 650; }
    .ep-artifact-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      margin-right: 10px;
      font-size: 12px;
    }
    .ep-artifact-link:hover { color: #80d0ff; }
    .ep-detail { margin-top: 8px; }
    .ep-detail pre {
      min-height: unset;
      max-height: 400px;
      margin: 4px 0 10px;
    }
    .ep-meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .ep-meta-row span { color: var(--muted); font-size: 12px; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      pre { min-height: 360px; }
      .grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>Kuavo 5-W 控制台</h1>
        <div class="sub">日常实验以 GUI 仿真为准；后台接口检查只确认 ROS/service 可用，不能验证动作效果。</div>
      </div>
      <a class="nav-link" href="/ssh_monitor.html">SSH 实时监控</a>
    </div>

    <div class="panel-stack">
      <section>
        <h2>流程控制</h2>
        <div class="status"><span id="dot" class="dot"></span><span id="status">空闲</span></div>

        <div class="flow">
          <div class="group">
            <h2>准备与连接</h2>
            <div class="hint">动作实验默认使用 GUI 仿真，便于观察手臂、底盘和复合动作。</div>
            <div class="grid">
              <button class="primary wide" data-action="connect">启动 / 连接 GUI 仿真</button>
              <button data-action="status">检查 ROS Ready</button>
              <button data-action="backend_check">后台接口检查</button>
            </div>
          </div>

          <div class="group">
            <h2>实验运行</h2>
            <div class="grid">
              <button data-action="probe">安全探测</button>
              <button data-action="forward">前进 Demo</button>
              <select id="scenario" class="wide"></select>
              <button id="runScenario" class="wide primary">运行 YAML 场景</button>
            </div>
          </div>

          <div class="group">
            <h2>导入脚本</h2>
            <div class="hint">列表隐藏导入烟雾测试脚本；诊断脚本和实验动作会显示分类。</div>
            <div class="grid">
              <input id="scriptFile" class="wide" type="file" accept=".py,text/x-python,text/plain">
              <button id="importScript" class="wide">导入脚本</button>
              <select id="script" class="wide"></select>
              <div id="scriptMeta" class="meta wide">未选择脚本。</div>
              <button id="runScript" class="wide primary">运行选中脚本</button>
            </div>
          </div>

          <div class="group">
            <h2>观察与诊断</h2>
            <div class="grid">
              <button data-action="log">查看 MuJoCo 日志</button>
              <button data-action="interfaces">检查 ROS 接口</button>
              <button data-action="smoke_test">运行 Smoke Test</button>
              <button data-action="env_snapshot">采集环境快照</button>
            </div>
          </div>

          <div class="group">
            <h2>安全控制</h2>
            <div class="grid">
              <button class="warn" data-action="pause">暂停 MPC</button>
              <button data-action="resume">恢复 MPC</button>
              <button class="danger" data-action="restore">复原 / 停止</button>
              <button class="danger" data-action="stop_sim">停止仿真进程</button>
            </div>
          </div>
        </div>
      </section>

      <section>
        <h2>Episode 管理</h2>
        <div class="hint">运行白名单实验并查看最近 episode。base_probe 默认禁用，需 A 确认。</div>

        <div class="flow">
          <div class="group">
            <h2>运行实验</h2>
            <div class="grid">
              <select id="experiment" class="wide"></select>
              <input id="epOperator" class="wide" type="text" value="C" placeholder="operator" maxlength="32" style="min-height:38px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:6px;padding:8px 10px;font:inherit;">
              <button id="runExperiment" class="wide primary">运行实验</button>
            </div>
          </div>

          <div class="group">
            <h2>最近 Episodes</h2>
            <div id="episodeList" class="ep-list" style="color:var(--muted);font-size:12px;">暂无 episode。</div>
            <div style="margin-top:8px">
              <button id="refreshEpisodes">刷新列表</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section>
      <h2 id="outputTitle">输出</h2>
      <pre id="output">就绪。</pre>
      <div id="epDetail" style="display:none;"></div>
    </section>
  </main>

  <script>
    const output = document.getElementById("output");
    const statusText = document.getElementById("status");
    const dot = document.getElementById("dot");
    const scenarioSelect = document.getElementById("scenario");
    const scriptSelect = document.getElementById("script");
    const scriptMeta = document.getElementById("scriptMeta");
    const scriptFile = document.getElementById("scriptFile");
    const buttons = [...document.querySelectorAll("button")];
    const scriptsByName = new Map();

    function setBusy(text) {
      statusText.textContent = text;
      dot.className = "dot busy";
      buttons.forEach((button) => button.disabled = true);
    }

    function setDone(ok, text) {
      statusText.textContent = text;
      dot.className = ok ? "dot ok" : "dot fail";
      buttons.forEach((button) => button.disabled = false);
    }

    function appendResult(title, result) {
      const body = result.output || "";
      output.textContent = `[${result.ts || new Date().toLocaleString()}] ${title}\nexit=${result.code} ok=${result.ok}\n\n${body}`;
    }

    async function callAction(name, params = {}) {
      const query = new URLSearchParams({ name, ...params });
      setBusy(`正在执行 ${name}...`);
      try {
        const response = await fetch(`/api/action?${query.toString()}`);
        const result = await response.json();
        appendResult(name, result);
        setDone(Boolean(result.ok), result.ok ? "完成" : "失败");
      } catch (error) {
        output.textContent = String(error);
        setDone(false, "请求失败");
      }
    }

    async function loadScenarios() {
      const response = await fetch("/api/scenarios");
      const data = await response.json();
      scenarioSelect.innerHTML = "";
      for (const name of data.scenarios || []) {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        scenarioSelect.appendChild(option);
      }
      if (!scenarioSelect.options.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "未找到场景文件";
        scenarioSelect.appendChild(option);
      }
    }

    async function loadScripts() {
      const response = await fetch("/api/scripts");
      const data = await response.json();
      scriptSelect.innerHTML = "";
      scriptsByName.clear();
      for (const item of data.script_info || []) {
        scriptsByName.set(item.name, item);
        const option = document.createElement("option");
        option.value = item.name;
        option.textContent = `${item.name} | ${item.category} | ${item.sha256_short}`;
        scriptSelect.appendChild(option);
      }
      if (!scriptSelect.options.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "未导入脚本";
        scriptSelect.appendChild(option);
      }
      updateScriptMeta();
    }

    function updateScriptMeta() {
      const info = scriptsByName.get(scriptSelect.value);
      if (!info) {
        scriptMeta.textContent = scriptSelect.value ? "脚本元信息不可用。" : "未选择脚本。";
        return;
      }
      scriptMeta.textContent = [
        `name: ${info.name}`,
        `category: ${info.category}`,
        `description: ${info.description}`,
        `mtime: ${info.mtime}`,
        `size: ${info.size} bytes`,
        `sha256: ${info.sha256}`,
      ].join("\n");
    }

    async function importScript() {
      const file = scriptFile.files && scriptFile.files[0];
      if (!file) {
        output.textContent = "请选择 .py 脚本文件。";
        setDone(false, "未选择文件");
        return;
      }
      setBusy("正在导入脚本...");
      try {
        const content = await file.text();
        const response = await fetch("/api/scripts/import", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify({ name: file.name, content }),
        });
        const result = await response.json();
        appendResult("import script", result);
        setDone(Boolean(result.ok), result.ok ? "导入完成" : "导入失败");
        if (result.ok) {
          await loadScripts();
          scriptSelect.value = file.name;
          updateScriptMeta();
        }
      } catch (error) {
        output.textContent = String(error);
        setDone(false, "导入请求失败");
      }
    }

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => callAction(button.dataset.action));
    });

    document.getElementById("runScenario").addEventListener("click", () => {
      if (scenarioSelect.value) callAction("scenario", { scenario: scenarioSelect.value });
    });

    document.getElementById("importScript").addEventListener("click", importScript);
    scriptSelect.addEventListener("change", updateScriptMeta);

    document.getElementById("runScript").addEventListener("click", () => {
      if (scriptSelect.value) callAction("script_fast", { script: scriptSelect.value });
    });

    // ---------- episode management (C 任务) ----------

    const epDetail = document.getElementById("epDetail");
    const outputPre = document.getElementById("output");
    const outputTitle = document.getElementById("outputTitle");
    const experimentSelect = document.getElementById("experiment");
    const epOperator = document.getElementById("epOperator");
    const episodeList = document.getElementById("episodeList");

    function showOutput() {
      outputPre.style.display = "";
      epDetail.style.display = "none";
      outputTitle.textContent = "输出";
    }

    function showEpisodeDetail() {
      outputPre.style.display = "none";
      epDetail.style.display = "";
      outputTitle.textContent = "Episode 详情";
    }

    async function loadExperiments() {
      try {
        const response = await fetch("/api/experiments");
        const data = await response.json();
        experimentSelect.innerHTML = "";
        for (const exp of data.experiments || []) {
          const option = document.createElement("option");
          option.value = exp.name;
          const label = exp.label || exp.name;
          const avail = exp.available ? "" : " (config 缺失)";
          option.textContent = `${label}${avail}`;
          if (!exp.enabled) {
            option.disabled = true;
            option.textContent += ` [${exp.disabled_reason || "禁用"}]`;
          }
          if (!exp.available) {
            option.disabled = true;
          }
          experimentSelect.appendChild(option);
        }
        if (!experimentSelect.options.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "无可用实验";
          experimentSelect.appendChild(option);
        }
      } catch (e) {
        experimentSelect.innerHTML = '<option value="">加载失败</option>';
      }
    }

    async function loadEpisodes() {
      try {
        const response = await fetch("/api/episodes");
        const data = await response.json();
        if (!data.episodes || !data.episodes.length) {
          episodeList.innerHTML = '<div style="padding:4px 0;">暂无 episode（outputs/run_index.jsonl 未生成或为空）。</div>';
          return;
        }
        episodeList.innerHTML = data.episodes.map(ep => {
          const okClass = ep.ok ? "ep-ok" : "ep-fail";
          const okText = ep.ok ? "✓" : "✗";
          const safeStop = ep.safe_stop_ok === null || ep.safe_stop_ok === undefined
            ? ""
            : ` | safe_stop: ${ep.safe_stop_ok ? "ok" : "fail"}`;
          const extTime = ep.external_timing_available
            ? ' <span title="external timing available">⏱</span>'
            : "";
          return `<div class="ep-item" onclick="viewEpisode('${ep.run_id}')">
            <div>
              <span class="${okClass}">${okText}</span>
              <strong>${ep.task_name || "?"}</strong>
              <span style="color:var(--muted);">${ep.entry_type || ""}</span>
              ${extTime}
            </div>
            <div style="font-size:11px;color:var(--muted);">
              ${ep.run_id} | operator: ${ep.operator || "?"} | ${(ep.duration_sec || 0).toFixed(1)}s${safeStop}
            </div>
          </div>`;
        }).join("");
      } catch (e) {
        episodeList.innerHTML = `<div style="color:var(--danger);">加载失败: ${e}</div>`;
      }
    }

    async function viewEpisode(runId) {
      showEpisodeDetail();
      epDetail.innerHTML = '<div style="color:var(--muted);">加载中...</div>';
      try {
        const response = await fetch(`/api/episodes/${runId}`);
        if (!response.ok) {
          const err = await response.json();
          epDetail.innerHTML = `<div style="color:var(--danger);">${err.output || response.statusText}</div>`;
          return;
        }
        const detail = await response.json();
        const metrics = detail.metrics || {};
        const result = detail.result || {};
        const artifacts = detail.artifacts || [];

        const artifactLinks = artifacts.map(a =>
          `<span class="ep-artifact-link" onclick="viewArtifact('${runId}','${a.name}');event.stopPropagation();">${a.name}</span>`
        ).join("");

        epDetail.innerHTML = `
          <div class="ep-detail">
            <div class="ep-meta-row">
              <span>run_id: <strong>${runId}</strong></span>
              <span>task: <strong>${metrics.task_name || "?"}</strong></span>
              <span>type: ${metrics.entry_type || "?"}</span>
              <span>operator: ${metrics.operator || "?"}</span>
              <span class="${metrics.ok ? 'ep-ok' : 'ep-fail'}">${metrics.ok ? '✓ ok' : '✗ fail'}</span>
              <span>${(metrics.duration_sec || 0).toFixed(1)}s</span>
            </div>
            ${metrics.failure_reason ? `<div style="color:var(--danger);margin-bottom:8px;">failure: ${metrics.failure_reason}</div>` : ""}
            <div style="margin-bottom:8px;"><strong>Artifacts:</strong> ${artifactLinks || "无"}</div>
            <div id="artifactContent"></div>
            <div style="margin-top:10px;">
              <button onclick="showOutput();outputPre.textContent='就绪。';">返回输出面板</button>
            </div>
          </div>`;
      } catch (e) {
        epDetail.innerHTML = `<div style="color:var(--danger);">请求失败: ${e}</div>`;
      }
    }

    async function viewArtifact(runId, name) {
      const contentDiv = document.getElementById("artifactContent");
      contentDiv.innerHTML = '<div style="color:var(--muted);">加载中...</div>';
      try {
        const response = await fetch(`/api/episodes/${runId}/artifact?name=${encodeURIComponent(name)}`);
        if (!response.ok) {
          const err = await response.json();
          contentDiv.innerHTML = `<div style="color:var(--danger);">${err.output || response.statusText}</div>`;
          return;
        }
        const artifact = await response.json();
        let display = "";
        if (artifact.type === "json" || artifact.type === "jsonl") {
          display = JSON.stringify(artifact.content, null, 2);
        } else {
          display = artifact.content || "(empty)";
        }
        contentDiv.innerHTML = `<h3>${name}</h3><pre>${escapeHtml(display)}</pre>`;
      } catch (e) {
        contentDiv.innerHTML = `<div style="color:var(--danger);">请求失败: ${e}</div>`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    async function runExperiment() {
      const experiment = experimentSelect.value;
      const operator = epOperator.value.trim() || "C";
      if (!experiment) {
        outputPre.textContent = "请选择一个实验。";
        setDone(false, "未选择实验");
        return;
      }
      showOutput();
      setBusy(`正在运行实验 ${experiment}...`);
      try {
        const response = await fetch("/api/episodes/run", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify({ experiment, operator }),
        });
        const result = await response.json();
        outputPre.textContent = `[${result.ts || new Date().toLocaleString()}] run experiment: ${experiment}\noperator: ${operator}\nexit=${result.code} ok=${result.ok}\nrun_id=${result.run_id || "N/A"}\n\n${result.output || ""}`;
        setDone(Boolean(result.ok), result.ok ? `完成 (${result.run_id || "?"})` : "失败");
        if (result.ok) {
          setTimeout(loadEpisodes, 500);
        }
      } catch (e) {
        outputPre.textContent = String(e);
        setDone(false, "请求失败");
      }
    }

    document.getElementById("runExperiment").addEventListener("click", runExperiment);
    document.getElementById("refreshEpisodes").addEventListener("click", () => {
      loadEpisodes();
      outputPre.textContent = "episode 列表已刷新。";
    });

    loadScenarios();
    loadScripts();
    loadExperiments();
    loadEpisodes();
  </script>
</body>
</html>
