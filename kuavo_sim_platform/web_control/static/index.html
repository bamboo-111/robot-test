<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kuavo 5-W 控制台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111317;
      --panel: #191d23;
      --panel-2: #202630;
      --text: #eef2f7;
      --muted: #9ca8b8;
      --line: #303846;
      --accent: #4fb3ff;
      --danger: #ff5b6b;
      --ok: #3fd183;
      --warn: #f2c94c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1100px, calc(100vw - 32px));
      margin: 24px auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }
    h1 {
      grid-column: 1 / -1;
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: 0;
    }
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar h1 { grid-column: auto; }
    a.nav-link {
      min-height: 36px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      text-decoration: none;
    }
    a.nav-link:hover { border-color: var(--accent); }
    .sub {
      grid-column: 1 / -1;
      margin: -8px 0 8px;
      color: var(--muted);
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 650;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button, select {
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
    }
    input[type="text"] {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: #173348; border-color: #25668f; }
    button.danger { background: #481b24; border-color: #8f2c3d; }
    button.warn { background: #3f3416; border-color: #7a6424; }
    button:disabled { opacity: .55; cursor: wait; }
    .wide { grid-column: 1 / -1; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.ok { background: var(--ok); }
    .dot.fail { background: var(--danger); }
    .dot.busy { background: var(--warn); }
    pre {
      margin: 0;
      min-height: 520px;
      max-height: calc(100vh - 200px);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #090b0e;
      color: #d8dee9;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      font: 12px/1.45 "Cascadia Mono", Consolas, monospace;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    .meta {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #10141a;
      color: var(--muted);
      padding: 8px 10px;
      font: 12px/1.45 "Cascadia Mono", Consolas, monospace;
      overflow-wrap: anywhere;
    }
    .stack {
      display: grid;
      gap: 10px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      margin: -4px 0 0;
    }
    input[type="file"] {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 10px;
      font: inherit;
    }
    select { width: 100%; }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      pre { min-height: 360px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>Kuavo 5-W 控制台</h1>
      <a class="nav-link" href="/ssh_monitor.html">SSH 实时监控</a>
    </div>
    <div class="sub">本地脚本控制台：启动仿真、执行脚本、复原、暂停/恢复 MPC、选择 YAML 场景。</div>


    <section>
      <h2>操作</h2>
      <div class="status"><span id="dot" class="dot"></span><span id="status">空闲</span></div>
      <div class="grid">
        <button class="primary" data-action="connect">启动 / 连接 GUI</button>
        <button data-action="connect_headless">低负载连接</button>
        <button data-action="probe">安全探测</button>
        <button data-action="forward">前进 Demo</button>
        <button class="danger" data-action="restore">复原 / 停止</button>
        <button class="warn" data-action="pause">暂停 MPC</button>
        <button data-action="resume">恢复 MPC</button>
        <button class="warn" data-action="sleep">休眠仿真</button>
        <button data-action="log">查看日志</button>
      </div>

      <div class="row">
        <select id="scenario"></select>
      </div>
      <div class="row">
        <button id="runScenario" class="wide primary">运行场景</button>
      </div>

      <div class="stack">
        <h2>导入脚本</h2>
        <input id="scriptFile" type="file" accept=".py,text/x-python,text/plain">
        <button id="importScript" class="wide">导入脚本</button>
        <select id="script"></select>
        <div id="scriptMeta" class="meta">未选择脚本。</div>
        <button id="runScript" class="wide primary">运行脚本</button>
      </div>
    </section>

    <section>
      <h2>输出</h2>
      <pre id="output">就绪。</pre>
    </section>
  </main>

  <script>
    const output = document.getElementById("output");
    const statusText = document.getElementById("status");
    const dot = document.getElementById("dot");
    const scenarioSelect = document.getElementById("scenario");
    const scriptSelect = document.getElementById("script");
    const scriptMeta = document.getElementById("scriptMeta");
    const scriptFile = document.getElementById("scriptFile");
    const buttons = [...document.querySelectorAll("button")];
    const scriptsByName = new Map();

    function setBusy(text) {
      statusText.textContent = text;
      dot.className = "dot busy";
      buttons.forEach((button) => button.disabled = true);
    }

    function setDone(ok, text) {
      statusText.textContent = text;
      dot.className = ok ? "dot ok" : "dot fail";
      buttons.forEach((button) => button.disabled = false);
    }

    function appendResult(title, result) {
      const body = result.output || "";
      output.textContent = `[${result.ts || new Date().toLocaleString()}] ${title}\nexit=${result.code} ok=${result.ok}\n\n${body}`;
    }

    async function callAction(name, params = {}) {
      const query = new URLSearchParams({ name, ...params });
      setBusy(`姝ｅ湪鎵ц ${name}...`);
      try {
        const response = await fetch(`/api/action?${query.toString()}`);
        const result = await response.json();
        appendResult(name, result);
        setDone(Boolean(result.ok), result.ok ? "完成" : "失败");
      } catch (error) {
        output.textContent = String(error);
        setDone(false, "请求失败");
      }
    }

    async function loadScenarios() {
      const response = await fetch("/api/scenarios");
      const data = await response.json();
      scenarioSelect.innerHTML = "";
      for (const name of data.scenarios || []) {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        scenarioSelect.appendChild(option);
      }
      if (!scenarioSelect.options.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "未找到场景文件";
        scenarioSelect.appendChild(option);
      }
    }

    async function loadScripts() {
      const response = await fetch("/api/scripts");
      const data = await response.json();
      scriptSelect.innerHTML = "";
      scriptsByName.clear();
      for (const item of data.script_info || []) {
        scriptsByName.set(item.name, item);
      }
      const scriptNames = (data.script_info || []).length
        ? data.script_info.map((item) => item.name)
        : (data.scripts || []);
      for (const name of scriptNames) {
        const info = scriptsByName.get(name);
        const option = document.createElement("option");
        option.value = name;
        option.textContent = info
          ? `${name} | ${info.sha256_short} | ${info.mtime}`
          : name;
        scriptSelect.appendChild(option);
      }
      if (!scriptSelect.options.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "未导入脚本";
        scriptSelect.appendChild(option);
      }
      updateScriptMeta();
    }

    function updateScriptMeta() {
      const info = scriptsByName.get(scriptSelect.value);
      if (!info) {
        scriptMeta.textContent = scriptSelect.value ? "脚本元信息不可用。" : "未选择脚本。";
        return;
      }
      scriptMeta.textContent = [
        `name: ${info.name}`,
        `mtime: ${info.mtime}`,
        `size: ${info.size} bytes`,
        `sha256: ${info.sha256}`,
      ].join("\n");
    }

    async function importScript() {
      const file = scriptFile.files && scriptFile.files[0];
      if (!file) {
        output.textContent = "请选择 .py 脚本文件。";
        setDone(false, "未选择文件");
        return;
      }
      setBusy("正在导入脚本...");
      try {
        const content = await file.text();
        const response = await fetch("/api/scripts/import", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: file.name, content }),
        });
        const result = await response.json();
        appendResult("import script", result);
        setDone(Boolean(result.ok), result.ok ? "导入完成" : "导入失败");
        if (result.ok) {
          await loadScripts();
          scriptSelect.value = file.name;
          updateScriptMeta();
        }
      } catch (error) {
        output.textContent = String(error);
        setDone(false, "导入请求失败");
      }
    }

    document.querySelectorAll("[data-action]").forEach((button) => {
      button.addEventListener("click", () => callAction(button.dataset.action));
    });

    document.getElementById("runScenario").addEventListener("click", () => {
      if (scenarioSelect.value) callAction("scenario", { name: scenarioSelect.value });
    });

    document.getElementById("importScript").addEventListener("click", importScript);

    scriptSelect.addEventListener("change", updateScriptMeta);

    document.getElementById("runScript").addEventListener("click", () => {
      if (scriptSelect.value) callAction("script_fast", { script: scriptSelect.value });
    });

    loadScenarios();
    loadScripts();
  </script>
</body>
</html>
