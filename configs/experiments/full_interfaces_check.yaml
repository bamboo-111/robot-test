schema_version: "0.2"
task_name: full_interfaces_check
entry_type: check
operator: B
permission_level: read_only
timeout_sec: 30

artifacts:
  save_stdout: true
  save_stderr: true
  save_config: true
  save_resolved_config: true
  save_manifest: true
  save_events: true
  save_capabilities: true

safety:
  require_preflight: false
  safe_stop_on_exit: false
  allow_motion: false

# Full ROS interface check: requires a live ROS master and verifies the
# critical command/control topics and services.
check:
  name: interfaces

# Reuse capabilities across runs to keep the full probe affordable.
capabilities:
  mode: cached
  max_age_sec: 30

success_criteria:
  type: exit_code_zero
